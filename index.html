<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirchi 360</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:white}
h1{text-align:center;color:gold}

.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}

.card{background:#1b1b1b;border-radius:10px;overflow:hidden}
.card img{width:100%;height:160px;object-fit:cover}
.card-body{padding:15px}

.price{color:gold;font-weight:bold}

button{background:gold;border:none;padding:8px;border-radius:5px;cursor:pointer}

.cart{position:fixed;right:0;top:0;width:260px;height:100%;background:#000;padding:15px;overflow:auto}

.admin{padding:20px;text-align:center}
input{padding:8px;margin:5px;width:80%}
</style>
</head>

<body>

<h1>Mirchi 360</h1>

<div id="app"></div>

<script>
let isAdmin = false;
let cart = [];

let menu = JSON.parse(localStorage.getItem("menu")) || [
  {name:"Zinger Burger",price:530},
  {name:"Pizza",price:1300},
  {name:"Biryani",price:1050}
];

function saveMenu(){
  localStorage.setItem("menu",JSON.stringify(menu));
}

function getImage(name){
  return "https://picsum.photos/400/300?random=" + encodeURIComponent(name);
}

function render(){

  const app = document.getElementById("app");

  if(isAdmin){
    app.innerHTML = `
      <div class="admin">
        <h2>Admin Panel</h2>
        <input id="name" placeholder="Food Name">
        <input id="price" placeholder="Price">
        <br>
        <button onclick="addItem()">Add Item</button>

        <h3>Menu</h3>
        ${menu.map((item,i)=>`
          <div>
            ${item.name} - Rs ${item.price}
            <button onclick="deleteItem(${i})">Delete</button>
          </div>
        `).join("")}

        <br>
        <button onclick="logout()">Logout</button>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div style="text-align:center">
      <h3>Admin Login</h3>
      <input id="user" placeholder="Username">
      <input id="pass" type="password" placeholder="Password">
      <br>
      <button onclick="login()">Login</button>
    </div>

    <div class="menu">
      ${menu.map((item,i)=>`
        <div class="card">
          <img src="${getImage(item.name)}">
          <div class="card-body">
            <h3>${item.name}</h3>
            <p class="price">₨ ${item.price}</p>
            <button onclick="addToCart(${i})">Add</button>
          </div>
        </div>
      `).join("")}
    </div>

    <div class="cart">
      <h3>Cart</h3>
      ${cart.map(i=>`<p>${i.name} - Rs ${i.price}</p>`).join("")}
      <h4>Total: Rs ${cart.reduce((s,i)=>s+i.price,0)}</h4>
      ${cart.length ? `<button onclick="order()">Order</button>` : ""}
    </div>
  `;
}

function login(){
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user==="admin" && pass==="1234"){
    isAdmin = true;
    render();
  }else{
    alert("Wrong login");
  }
}

function logout(){
  isAdmin = false;
  render();
}

function addItem(){
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  if(!name || !price) return;

  menu.push({name,price:Number(price)});
  saveMenu();
  render();
}

function deleteItem(i){
  menu.splice(i,1);
  saveMenu();
  render();
}

function addToCart(i){
  cart.push(menu[i]);
  render();
}

function order(){
  let text="Mirchi 360 Order\n";
  cart.forEach(i=>{
    text+=`${i.name} - Rs ${i.price}\n`;
  });

  window.open("https://wa.me/923324187360?text="+encodeURIComponent(text));
}

render();
</script>

</body>
</html>
