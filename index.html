<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirchi 360</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- 🔥 HEADER -->
<header>
  <img src="logo.png" class="logo">
  <h1>Mirchi 360</h1>
</header>

<!-- 🔥 ADD FOOD (ADMIN) -->
<div class="admin">
  <input id="name" placeholder="Food Name">
  <input id="price" placeholder="Price">
  <input type="file" id="img">
  <button onclick="addItem()">Add Food</button>
</div>

<!-- 🔥 MENU -->
<h2 class="title">Our Menu</h2>
<div id="menu" class="menu"></div>

<!-- 🔥 CART -->
<div class="cart">
  <h2>Cart</h2>
  <div id="cartItems"></div>

  <h3>Payment</h3>
  <label><input type="radio" name="pay"> Cash</label>
  <label><input type="radio" name="pay"> JazzCash</label>
  <label><input type="radio" name="pay"> EasyPaisa</label>

  <button onclick="orderWhatsApp()">Order Now</button>
</div>

<!-- 📍 MAP -->
<div class="map">
  <iframe 
    src="https://www.google.com/maps?q=Mirchi+360&output=embed"
    width="100%" height="250" style="border:0;border-radius:15px;">
  </iframe>
</div>

<script src="app.js"></script>
</body>
</html>
