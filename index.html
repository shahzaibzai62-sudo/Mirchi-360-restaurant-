<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirchi 360</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

</head>
<body>

<!-- HEADER -->
<header>
  <img src="logo.png" class="logo">
</header>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h1>Mirchi 360 🔥</h1>
    <p>Premium BBQ • Fast Food • Chinese</p>
  </div>
</section>

<!-- MENU -->
<section id="menu" class="menu"></section>

<!-- CART -->
<section class="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: Rs <span id="total">0</span></h3>

  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone">

  <button onclick="order()">Order Now</button>
</section>

<!-- MAP -->
<section class="map">
  <h2>📍 Location</h2>
  <iframe src="https://www.google.com/maps?q=iECvdpyygA3gvBbB6&output=embed"></iframe>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" onclick="order()">💬</a>

<script src="app.js"></script>

</body>
</html>
