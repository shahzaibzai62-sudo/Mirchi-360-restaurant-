<!DOCTYPE html>
<html>
<head>
  <title>Mirchi 360</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">🔥 Mirchi 360</div>

<!-- HEADER -->
<header>
  <img src="logo.png" class="logo">
  <h1>Mirchi 360</h1>
</header>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h2>Admin Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="box" style="display:none;">
  <input id="name" placeholder="Food Name">
  <input id="price" placeholder="Price">
  <input type="file" id="img">
  <button onclick="addItem()">Add Food</button>
</div>

<!-- MENU IMAGE -->
<h2>Full Menu</h2>
<img src="menu.jpg" class="menu-img">

<!-- CARDS -->
<div id="menu" class="menu"></div>

<!-- CART -->
<h2>Cart</h2>
<div id="cart"></div>

<!-- PAYMENT -->
<div class="box">
  <h3>Payment</h3>
  <label><input type="radio" name="pay" value="Cash"> Cash</label>
  <label><input type="radio" name="pay" value="JazzCash"> JazzCash</label>
  <label><input type="radio" name="pay" value="EasyPaisa"> EasyPaisa</label>
</div>

<!-- WHATSAPP -->
<a id="whatsappBtn" class="whatsapp">Order Now</a>

<script src="app.js"></script>
</body>
</html>
